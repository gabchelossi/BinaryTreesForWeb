<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

</head>
<body>    
    <fieldset id = "control-panel">
        <legend>Control Panel</legend>
        <table style = "height: 100%; width: 80%;">
            <tr>
                <th colspan="1">Key</th>
                <th colspan="3">Operations</th>
                <th colspan="3">Animation</th>
                <th colspan="3">Keys</th>
                <th colspan = "5">Terminal</th>
            </tr>
            <tr>
                <td rowspan="3">
                    <input type = "number" style = "height: 100%; font-size: 25px;text-align: center;">
                </td>
                <td>
                    <input type = "button" value = "Add">
                </td>
                <td>
                    <input type = "button" value = "Delete">
                </td>
                <td>
                    <input type = "button" value = "Search">
                </td>
                <td>
                    <input type="radio" id="Automatic" name="animationselection" value="Automatic" checked />
                        <label for="Automatic">Automatic</label>
                </td>
                <td>
                    <input type="radio" id="Manual" name="animationselection" value="Manual" />
                        <label for="Manual">Manual</label>
                </td>
                <td>
                    <input type="radio" id="Off" name="animationselection" value="Off" />
                        <label for="Off">Off</label>
                </td>
                <td colspan ="2" rowspan="3">
                    <input type = "button" value = "&#9658;">
                </td>
                <td rowspan="3">
                    <input type = "button" value = "&#8594;">
                </td>
                <td colspan="5" rowspan = "4">
                    <div id="console">
                        <div id="console-bar">
                            <!-- <span class="console-dot red"></span>
                            <span class="console-dot green"></span> 
                            <span class="console-dot yellow" id="toggle-console"></span>-->
                        </div>
                        <div id="console-content">
                            <p>
                                <b>guest@gchelossi:</b>
                                <span id="text"></span>
                                <span id="cursor"> █</span>
                            </p>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="3">
                    <input type = "button" value = "Trasverse" style = "width: 100%">
                </td>
                <td colspan="3">
                    <input
                        type="range"
                        id="speed"
                        name="speed"
                        min="1"
                        max="5"
                        value="1"
                        step="1" />
                    <label for="speed">x1 Animation Speed</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="radio" id="In-Order" name="trasversalselection" value="In-Order" checked />
                        <label for="In-Order">In-Order</label>
                </td>
                <td>
                    <input type="radio" id="Pre-Order" name="trasversalselection" value="Pre-Order" />
                        <label for="Pre-Order">Pre-Order</label>
                </td>
                <td>
                    <input type="radio" id="Post-Order" name="trasversalselection" value="Post-Order" />
                        <label for="Post-Order">Post-Order</label>
                </td>
                
            </tr>
                      
        </table>
    </fieldset>       
    <script src="./js/gui.js" type="module"></script>
</body>
</html>
