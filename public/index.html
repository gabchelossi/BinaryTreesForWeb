<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

</head>
<body>
    <div id = "main">
        <fieldset id = "control-panel">
            <legend>Control Panel</legend>
            <table style = "height: 100%; width: 90%;">
                
                
                <tr>
                    <th colspan="1">Key</th>
                    <th colspan="3">Operations</th>
                    <th colspan="3">Animation</th>
                    <th colspan = "6">Terminal</th>
                </tr>
                <tr>
                    <td rowspan="3" id = "inputtd">
                        <input type = "number" style = "height: 100%; font-size: 25px;text-align: center;" size = "4">
                    </td>
                    <td>
                        <input id = "add-button" type = "button" value = "Add">
                    </td>
                    <td>
                        <input id = "delete-button" type = "button" value = "Delete">
                    </td>
                    <td>
                        <input id = "search-button" type = "button" value = "Search">
                    </td>
                    <td colspan="2">
                        <input type="radio" id="Automatic" name="animationselection" value="Automatic" checked />
                            <label for="Automatic">On</label>
                    </td>
                    <td>
                        <input type="radio" id="Off" name="animationselection" value="Off" />
                            <label for="Off">Off</label>
                    </td>
                    <td id="console-container" colspan="3" rowspan = "3">
                        <div id="console">
                            <div id="console-content">
                                <p>
                                    <b>guest@gchelossi:</b>
                                    <span id="text"></span>
                                    <span id="cursor"> █</span>
                                </p>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="3">
                        <input id = "traverse-button" type = "button" value = "Traverse" style = "width: 100%">
                    </td>
                    <td colspan="3">
                        <input
                            type="range"
                            id="speed"
                            name="speedBar"
                            min="1"
                            max="5"
                            value="1"
                            step="1" />
                        <label id = "labelspeed" for="speed">x1 Speed</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="radio" id="In-Order" name="trasversalselection" value="in-order" checked />
                            <label for="In-Order">In-Order</label>
                    </td>
                    <td>
                        <input type="radio" id="Pre-Order" name="trasversalselection" value="pre-order" />
                            <label for="Pre-Order">Pre-Order</label>
                    </td>
                    <td>
                        <input type="radio" id="Post-Order" name="trasversalselection" value="post-order" />
                            <label for="Post-Order">Post-Order</label>
                    </td>
                    <td colspan="3">
                        <label for="AVL">AVL?</label>
                        <input type="checkbox" id="AVL" name="AVL" />  
                    </td>
                </tr>
                        
            </table>
        </fieldset>       
    </div>
    <div id = "alternate">
        <h1>Please make the screen wider/taller to display the page.</h1>
    </div>
    <script src="./js/gui.js" type="module"></script>
</body>
</html>
